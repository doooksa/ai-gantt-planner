# Serves the SPA and proxies API + WebSocket to the backend container.
# `backend` resolves via the docker-compose network. This mirrors the Vite dev
# proxy so the deployed same-origin setup behaves like local dev.

upstream backend {
    server backend:8000;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # REST + SSE. proxy_buffering off keeps the /api/chat SSE stream flowing.
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }

    # MCP endpoint (streamable HTTP), in case it is reached through the front door.
    location /mcp/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }

    # WebSocket upgrade for /ws.
    location /ws {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
